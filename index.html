<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 天氣 Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: rgba(0, 0, 0, 1);
            --text-color: #ffffff;
            --accent-color: #3b82f6;
            --secondary-text: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fira Sans', "Microsoft JhengHei", sans-serif;
            color: var(--text-color);
            background-color: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body.preview-mode {
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)), 
                        url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: auto;
            align-items: flex-start;
            padding: 2rem;
        }

        #preview-container {
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(4px);
            padding: 2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
        }

        #widget {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            display: none;
            transition: opacity 0.3s ease;
        }

        #widget.active {
            display: flex;
        }

        /* --- Square Layout --- */
        .format-square {
            width: 400px;
            flex-direction: column !important;
            gap: 12px;
            padding: 15px !important;
            height: auto !important;
            min-height: 0 !important;
        }
        .format-square .widget-section { width: 100%; padding: 0 !important; }
        .format-square .details-grid { grid-template-columns: repeat(2, 1fr); margin-bottom: 5px; }
        .format-square .main-weather { margin-bottom: 10px; }

        /* --- Rectangular Layout --- */
        .format-rectangular {
            width: 900px;
            height: 170px;
            flex-direction: row !important;
            align-items: stretch;
            padding: 0 !important;
            gap: 0 !important;
        }

        .format-rectangular .widget-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 25px;
            height: 100%;
        }
        .format-rectangular .current-info-section { flex: 1.2; }
        .format-rectangular .details-section { 
            flex: 1; 
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }
        .format-rectangular .forecast-section { flex: 2.2; }
        .format-rectangular .details-grid { grid-template-columns: 1fr; gap: 8px; margin-bottom: 0; background: transparent; padding: 0; }
        .format-rectangular .current-header { margin-bottom: 10px; }
        .format-rectangular .main-weather { margin-bottom: 0; }

        /* Common Elements */
        .location-info h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .current-time {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--secondary-text);
        }
        .main-weather {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .weather-icon-large {
            width: 56px;
            height: 56px;
            stroke-width: 1.5;
            color: var(--accent-color);
        }
        .current-temp {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            font-family: 'Fira Code', monospace;
        }
        .temp-range {
            font-size: 0.8rem;
            color: var(--secondary-text);
            margin-top: 4px;
        }
        .weather-desc {
            font-size: 0.9rem;
            color: var(--secondary-text);
            font-weight: 500;
        }

        .details-grid {
            display: grid;
            gap: 8px;
            background: var(--glass-bg);
            padding: 12px;
            border-radius: 8px;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--secondary-text);
        }
        .detail-item span { color: var(--text-color); font-family: 'Fira Code', monospace; }

        .forecast-container {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .forecast-day {
            flex: 1;
            min-width: 0;
            background: var(--glass-bg);
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .forecast-date { font-size: 0.7rem; color: var(--secondary-text); }
        .forecast-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .forecast-temp { font-size: 0.75rem; font-weight: 600; font-family: 'Fira Code', monospace; }
        .forecast-rain { font-size: 0.65rem; color: #60a5fa; display: flex; align-items: center; gap: 2px; }

        /* Preview UI */
        #config-panel {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            width: 400px;
            margin-right: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group { margin-bottom: 1.2rem; position: relative; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: #fff; }
        
        /* Search Suggestions */
        #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .search-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            font-size: 0.85rem;
        }
        .search-item:hover { background: #334155; }
        .search-item .item-sub { font-size: 0.75rem; color: #94a3b8; }

        .btn { background: var(--accent-color); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .result-url { margin-top: 1.5rem; padding: 12px; background: #000; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 0.75rem; word-break: break-all; border: 1px solid #334155; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; padding: 4px 8px; font-size: 0.7rem; background: #334155; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="preview-container" style="display: none; width: 100%; max-width: 1300px; display: flex;">
        <div id="config-panel">
            <h2>天氣 Widget 設定</h2>
            <div class="form-group">
                <label>城市搜尋</label>
                <input type="text" id="city-input" placeholder="輸入城市名稱 (例如: 台北)" autocomplete="off">
                <div id="search-results"></div>
            </div>
            <div class="form-group"><label>顯示標籤 (自訂文字)</label><input type="text" id="label-input"></div>
            <div class="form-group"><label>預測天數</label><select id="days-input"><option value="3">3 日</option><option value="5" selected>5 日</option><option value="7">7 日</option></select></div>
            <div class="form-group"><label>版型</label><select id="format-input"><option value="square">方形 (Square)</option><option value="rectangular">長形 (Rectangular)</option></select></div>
            <div class="form-group"><label>背景透明度 (0-100)</label><input type="number" id="opacity-input" value="80"></div>
            <button class="btn" id="generate-btn">更新預覽</button>
            <div class="result-url"><span id="url-text"></span><div class="copy-btn" onclick="copyUrl()">複製</div></div>
        </div>
        <div class="preview-area" style="flex:1">
            <h3 style="margin-bottom:15px">預覽 (OBS 中請依比例縮放)</h3>
            <div id="widget-preview-wrapper"></div>
        </div>
    </div>

    <div id="widget">
        <div class="widget-section current-info-section">
            <div class="current-header">
                <div class="location-info">
                    <h1 id="ui-label">--</h1>
                    <div class="current-time" id="ui-time">--:--</div>
                </div>
                <div class="weather-desc" id="ui-desc">--</div>
            </div>
            <div class="main-weather">
                <div id="ui-icon-large"></div>
                <div class="temp-display">
                    <div class="current-temp"><span id="ui-temp">--</span>°</div>
                    <div class="temp-range">↑ <span id="ui-max">--</span>°  ↓ <span id="ui-min">--</span>°</div>
                </div>
            </div>
        </div>
        <div class="widget-section details-section">
            <div class="details-grid">
                <div class="detail-item"><i data-lucide="thermometer" size="14"></i>體感 <span id="ui-feels">--</span>°</div>
                <div class="detail-item"><i data-lucide="droplets" size="14"></i>濕度 <span id="ui-humidity">--</span>%</div>
                <div class="detail-item"><i data-lucide="wind" size="14"></i>風速 <span id="ui-wind">--</span> km/h</div>
                <div class="detail-item"><i data-lucide="cloud-rain" size="14"></i>降雨 <span id="ui-rain">--</span> mm</div>
            </div>
        </div>
        <div class="widget-section forecast-section">
            <div class="forecast-container" id="ui-forecast"></div>
        </div>
    </div>

    <script>
        const weatherMap = { 0: { icon: 'sun', text: '晴朗' }, 1: { icon: 'sun', text: '晴時多雲' }, 2: { icon: 'cloud-sun', text: '多雲' }, 3: { icon: 'cloud', text: '陰天' }, 45: { icon: 'cloud-fog', text: '霧' }, 51: { icon: 'cloud-drizzle', text: '細雨' }, 61: { icon: 'cloud-rain', text: '小雨' }, 63: { icon: 'cloud-rain', text: '中雨' }, 80: { icon: 'cloud-rain-wind', text: '陣雨' }, 95: { icon: 'cloud-lightning', text: '雷陣雨' } };
        const getW = (c) => weatherMap[c] || { icon: 'cloud', text: '未知' };
        
        const params = new URLSearchParams(window.location.search);
        let config = { 
            lat: params.get('lat'), 
            lon: params.get('lon'), 
            city: params.get('city'), 
            label: params.get('label'), 
            days: parseInt(params.get('days')) || 5, 
            format: params.get('format') || 'square', 
            opacity: params.get('opacity') || 100 
        };

        let weatherTimer, timeTimer;

        if (!config.city && !config.lat) {
            document.body.classList.add('preview-mode');
            document.getElementById('preview-container').style.display = 'flex';
            document.getElementById('widget-preview-wrapper').appendChild(document.getElementById('widget'));
            setupSearch();
            document.getElementById('generate-btn').onclick = updatePreview;
            
            // Default to Taipei
            config.city = "台北市";
            config.lat = 25.0372; config.lon = 121.5637;
            document.getElementById('city-input').value = config.city;
            updatePreview();
        } else {
            init();
        }

        async function init() {
            const w = document.getElementById('widget');
            w.className = `format-${config.format} active`;
            w.style.backgroundColor = `rgba(0,0,0,${config.opacity/100})`;
            
            // Setup Timers
            clearInterval(timeTimer);
            updateTime();
            timeTimer = setInterval(updateTime, 60000);

            clearInterval(weatherTimer);
            await fetchWeatherOnly();
            weatherTimer = setInterval(fetchWeatherOnly, 900000); // Update weather every 15 mins
        }

        async function fetchWeatherOnly() {
            try {
                let lat = config.lat, lon = config.lon;
                if (!lat || !lon) {
                    const gRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(config.city)}&count=1&language=zh`);
                    const gData = await gRes.json();
                    if (gData.results) {
                        lat = gData.results[0].latitude;
                        lon = gData.results[0].longitude;
                        config.lat = lat; config.lon = lon;
                    } else throw new Error();
                }

                document.getElementById('ui-label').innerText = config.label || config.city || "未知地點";
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max&timezone=auto&forecast_days=${config.days + 1}`);
                const data = await res.json();
                render(data);
                lucide.createIcons();
            } catch (e) { console.error("Weather fetch failed", e); }
        }

        function render(data) {
            const cur = data.current;
            const info = getW(cur.weather_code);
            document.getElementById('ui-desc').innerText = info.text;
            document.getElementById('ui-temp').innerText = Math.round(cur.temperature_2m);
            document.getElementById('ui-max').innerText = Math.round(data.daily.temperature_2m_max[0]);
            document.getElementById('ui-min').innerText = Math.round(data.daily.temperature_2m_min[0]);
            document.getElementById('ui-feels').innerText = Math.round(cur.apparent_temperature);
            document.getElementById('ui-humidity').innerText = cur.relative_humidity_2m;
            document.getElementById('ui-wind').innerText = cur.wind_speed_10m;
            document.getElementById('ui-rain').innerText = cur.precipitation;
            document.getElementById('ui-icon-large').innerHTML = `<i data-lucide="${info.icon}" class="weather-icon-large"></i>`;
            const forecast = document.getElementById('ui-forecast');
            forecast.innerHTML = '';
            for(let i=1; i<data.daily.time.length; i++) {
                const d = new Date(data.daily.time[i]);
                const fInfo = getW(data.daily.weather_code[i]);
                const rainProb = data.daily.precipitation_probability_max[i];
                forecast.innerHTML += `
                    <div class="forecast-day">
                        <div class="forecast-date">${d.getMonth()+1}/${d.getDate()}</div>
                        <i data-lucide="${fInfo.icon}" class="forecast-icon"></i>
                        <div class="forecast-temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
                        <div class="forecast-rain"><i data-lucide="droplets" size="10"></i>${rainProb}%</div>
                    </div>`;
            }
        }

        function setupSearch() {
            const input = document.getElementById('city-input');
            const results = document.getElementById('search-results');
            let timer;
            input.oninput = () => {
                clearTimeout(timer);
                if (!input.value) { results.style.display = 'none'; return; }
                timer = setTimeout(async () => {
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input.value)}&count=5&language=zh`);
                    const data = await res.json();
                    if (data.results) {
                        results.innerHTML = data.results.map(loc => `
                            <div class="search-item" onclick="selectLoc(${loc.latitude}, ${loc.longitude}, '${loc.name}', '${loc.admin1 || ''}, ${loc.country}')">
                                <div>${loc.name}</div>
                                <div class="item-sub">${loc.admin1 || ''} ${loc.country}</div>
                            </div>
                        `).join('');
                        results.style.display = 'block';
                    }
                }, 300);
            };
        }

        window.selectLoc = (lat, lon, name, sub) => {
            config.lat = lat; config.lon = lon; config.city = name;
            document.getElementById('city-input').value = name;
            document.getElementById('search-results').style.display = 'none';
            init();
        };

        function updateTime() {
            const n = new Date();
            document.getElementById('ui-time').innerText = n.toLocaleDateString('zh-TW', {month:'short', day:'numeric', weekday:'short'}) + ' ' + n.toLocaleTimeString('zh-TW', {hour12:false, hour:'2-digit', minute:'2-digit'});
        }

        function updatePreview() {
            config.label = document.getElementById('label-input').value;
            config.days = parseInt(document.getElementById('days-input').value);
            config.format = document.getElementById('format-input').value;
            config.opacity = document.getElementById('opacity-input').value;
            init();
            const baseUrl = window.location.origin + window.location.pathname;
            const q = new URLSearchParams({lat:config.lat, lon:config.lon, city:config.city, label:config.label||config.city, days:config.days, format:config.format, opacity:config.opacity}).toString();
            document.getElementById('url-text').innerText = baseUrl + '?' + q;
        }

        function copyUrl() { navigator.clipboard.writeText(document.getElementById('url-text').innerText).then(() => alert('網址已複製！')); }
    </script>
</body>
</html>
