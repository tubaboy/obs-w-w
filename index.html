<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 天氣 Widget 產生器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: rgba(0, 0, 0, 1);
            --text-color: #ffffff;
            --accent-color: #3b82f6;
            --secondary-text: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fira Sans', "Microsoft JhengHei", sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-y: auto;
            padding: 3rem 1rem;
        }

        #preview-container {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 1400px;
            display: flex;
            gap: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        #config-panel { width: 420px; flex-shrink: 0; }
        
        h2 { margin-bottom: 1.5rem; font-weight: 700; color: #fff; }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.9rem; color: #94a3b8; }
        input, select { 
            width: 100%; padding: 12px 16px; border-radius: 10px; background: #0f172a; 
            border: 1px solid #334155; color: #fff; font-size: 0.95rem;
        }
        
        #search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #1e293b;
            border: 1px solid #334155; border-radius: 10px; margin-top: 6px;
            max-height: 250px; overflow-y: auto; z-index: 100; display: none;
        }
        .search-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #334155; }
        .search-item:hover { background: #334155; }
        .search-item .item-sub { font-size: 0.75rem; color: #94a3b8; }

        .btn { 
            background: var(--accent-color); color: white; border: none; padding: 14px; 
            border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; 
            margin-top: 1rem; font-size: 1rem;
        }
        .result-url { 
            margin-top: 2rem; padding: 14px; background: #000; border-radius: 10px; 
            font-family: 'Fira Code', monospace; font-size: 0.75rem; word-break: break-all; 
            border: 1px solid #334155; position: relative; color: #10b981;
        }
        .copy-btn { 
            position: absolute; top: 6px; right: 6px; padding: 4px 10px; font-size: 0.7rem; 
            background: #334155; border-radius: 6px; cursor: pointer; color: #fff;
        }

        .preview-area { flex: 1; }
        iframe {
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dim { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="preview-container">
        <div id="config-panel">
            <h2>Widget 設定</h2>
            <div class="form-group">
                <label>地點搜尋</label>
                <input type="text" id="city-input" placeholder="輸入城市或地區..." autocomplete="off">
                <div id="search-results"></div>
            </div>
            <div class="form-group"><label>顯示標籤 (選填)</label><input type="text" id="label-input" placeholder="例如：我的直播間"></div>
            <div class="form-group"><label>預測天數</label><select id="days-input"><option value="3">3 日</option><option value="5" selected>5 日</option><option value="7">7 日</option></select></div>
            <div class="form-group"><label>版型</label><select id="format-input"><option value="square">方形 (Square)</option><option value="rectangular">長形 (Rectangular)</option></select></div>
            <div class="form-group"><label>背景透明度 (0-100)</label><input type="number" id="opacity-input" value="80"></div>
            <button class="btn" id="generate-btn">更新預覽</button>
            
            <div class="result-url">
                <span id="url-text">請先搜尋地點</span>
                <div class="copy-btn" onclick="copyUrl()">複製</div>
            </div>
            <p class="dim">※ 將此網址貼入 OBS 的瀏覽器來源中。</p>
        </div>

        <div class="preview-area">
            <h3 style="margin-bottom:20px;">即時預覽 (OBS 真實畫面)</h3>
            <div id="iframe-container">
                <iframe id="widget-preview" width="900" height="480" frameborder="0"></iframe>
            </div>
            <div class="dim" id="dim-info">建議尺寸: 900 x 180</div>
        </div>
    </div>

    <script>
        let config = { lat: 25.0372, lon: 121.5637, city: "台北市", label: "", days: 5, format: "square", opacity: 80 };

        function setupSearch() {
            const input = document.getElementById('city-input');
            const results = document.getElementById('search-results');
            let timer;
            input.oninput = () => {
                clearTimeout(timer);
                if (!input.value) { results.style.display = 'none'; return; }
                timer = setTimeout(async () => {
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input.value)}&count=5&language=zh`);
                    const data = await res.json();
                    if (data.results) {
                        results.innerHTML = data.results.map(loc => `
                            <div class="search-item" onclick="selectLoc(${loc.latitude}, ${loc.longitude}, '${loc.name}', '${loc.admin1 || ''}, ${loc.country}')">
                                <div style="font-weight:600">${loc.name}</div>
                                <div class="item-sub">${loc.admin1 || ''} ${loc.country}</div>
                            </div>
                        `).join('');
                        results.style.display = 'block';
                    }
                }, 300);
            };
        }

        window.selectLoc = (lat, lon, name, sub) => {
            config.lat = lat; config.lon = lon; config.city = name;
            document.getElementById('city-input').value = name;
            document.getElementById('search-results').style.display = 'none';
            updatePreview();
        };

        function updatePreview() {
            config.label = document.getElementById('label-input').value;
            config.days = document.getElementById('days-input').value;
            config.format = document.getElementById('format-input').value;
            config.opacity = document.getElementById('opacity-input').value;

            const baseUrl = window.location.href.split('index.html')[0].split('?')[0];
            const widgetUrl = baseUrl + 'widget.html';
            const q = new URLSearchParams({
                lat: config.lat, lon: config.lon, city: config.city, 
                label: config.label || config.city, days: config.days, 
                format: config.format, opacity: config.opacity
            }).toString();
            
            const finalUrl = widgetUrl + '?' + q;
            document.getElementById('url-text').innerText = finalUrl;
            
            const iframe = document.getElementById('widget-preview');
            iframe.src = finalUrl;

            if (config.format === 'rectangular') {
                iframe.width = 900; iframe.height = 180;
                document.getElementById('dim-info').innerText = "建議 OBS 尺寸: 900 x 180";
            } else {
                iframe.width = 400; iframe.height = 480;
                document.getElementById('dim-info').innerText = "建議 OBS 尺寸: 400 x 480";
            }
        }

        document.getElementById('generate-btn').onclick = updatePreview;
        setupSearch();
        document.getElementById('city-input').value = config.city;
        updatePreview();

        function copyUrl() {
            const url = document.getElementById('url-text').innerText;
            navigator.clipboard.writeText(url).then(() => alert('網址已複製！'));
        }
    </script>
</body>
</html>
